services:
  api:
    build: .
    container_name: api
    ports:
      - "3333:3333"
    depends_on:
      api-gypass-pg:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env.docker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://docker:docker@api-gypass-pg:5432/apigyss_bd

  api-gypass-pg:
    image: bitnami/postgresql
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: apigyss_bd
    volumes:
      - postgres-data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis
    container_name: redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    env_file:
      - .env.docker
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: